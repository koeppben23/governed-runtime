[]
# Allowlist for paths that should be skipped during secret scanning
[allowlist]
paths = [
  "node_modules/.*",
  "dist/.*",
  "coverage/.*",
  "*.test.ts",
  "*.spec.ts",
  "fixtures/.*",
  ".github/.*"
]

regexes = [
  "^test-.*$",
  "^EXAMPLE-.*$",
  "^MOCK-.*$",
  "placeholder.*",
  "your-.*-here"
]
