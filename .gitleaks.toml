# Gitleaks configuration
# See: https://github.com/zricethezav/gitleaks#configuration

# Allowlist: paths to skip during scanning
[allowlist]
  paths = [
    "node_modules/",
    "dist/",
    "coverage/",
    ".git/"
  ]
  regexes = [
    "^test-.*$",
    "^EXAMPLE-.*$",
    "^MOCK-.*$",
    "placeholder.*",
    "your-.*-here"
  ]
