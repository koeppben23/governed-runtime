name: Fuzz Testing (Nightly)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    name: fuzz-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node v6.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deep fuzz tests
        id: fuzz
        run: npm run test:fuzz:deep 2>&1 | tee fuzz-output.txt
        env:
          FAST_CHECK_SEED: 12345
        continue-on-error: true

      - name: Check fuzz result
        run: |
          if grep -q 'FAIL' fuzz-output.txt; then
            echo "Fuzz tests failed — check uploaded artifact for seed/path."
            exit 1
          fi

      - name: Upload fuzz output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: fuzz-output
          path: fuzz-output.txt
