name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          echo "Tag: $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Type check
        run: npm run check
        env:
          FORCE_COLOR: 0

      - name: Run tests
        run: npm test
        env:
          FORCE_COLOR: 0

      - name: Build
        run: npm run build
        env:
          FORCE_COLOR: 0

      - name: Verify ESM import correctness
        run: npm run check:esm
        env:
          FORCE_COLOR: 0

  release:
    name: release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify ESM import correctness
        run: npm run check:esm

      - name: Copy LICENSE to dist
        run: cp LICENSE dist/

      - name: Create npm package
        run: |
          mkdir -p release
          npm pack --pack-destination release/

      - name: Validate asset naming
        run: |
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          EXPECTED_FILENAME="flowguard-core-${PKG_VERSION}.tgz"
          CREATED_FILENAME=$(find release -maxdepth 1 -name "*.tgz" -type f -printf "%f\n" 2>/dev/null | head -1)
          echo "Expected: $EXPECTED_FILENAME"
          echo "Created: $CREATED_FILENAME"
          if [ "$CREATED_FILENAME" != "$EXPECTED_FILENAME" ]; then
            echo "::error::Asset filename mismatch. Expected '$EXPECTED_FILENAME' but got '$CREATED_FILENAME'"
            exit 1
          fi
          echo "Asset naming validated successfully."

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum ./*.tgz > checksums.sha256

      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@4.1.1 \
            --spec-version 1.6 \
            --output-format JSON \
            --output-reproducible \
            --output-file release/sbom.cdx.json \
            --validate

      - name: Attest package provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*.tgz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/*.tgz \
            release/checksums.sha256 \
            release/sbom.cdx.json \
            LICENSE \
            --title "FlowGuard v${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --verify-tag
