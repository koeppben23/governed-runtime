name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          echo "Tag: $TAG_VERSION"
          echo "VERSION file: $FILE_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match VERSION file $FILE_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Type check
        run: npm run check
        env:
          FORCE_COLOR: 0

      - name: Run tests
        run: npm test
        env:
          FORCE_COLOR: 0

      - name: Build
        run: npm run build
        env:
          FORCE_COLOR: 0

  release:
    name: release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate SBOM (CycloneDX)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SBOM="flowguard-${VERSION}-sbom.cdx.json"
          npm sbom --sbom-format cyclonedx --sbom-type library > "$SBOM"
          echo "SBOM=$SBOM" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Package release tarball
        run: |
          TARBALL="flowguard-${{ env.VERSION }}.tar.gz"
          tar -czf "$TARBALL" \
            dist/ \
            package.json \
            package-lock.json \
            README.md \
            CHANGELOG.md \
            SECURITY.md \
            VERSION \
            LICENSE 2>/dev/null || true
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Generate checksums
        run: |
          CHECKSUMS="flowguard-${{ env.VERSION }}-checksums.sha256"
          sha256sum "${{ env.TARBALL }}" "${{ env.SBOM }}" > "$CHECKSUMS"
          echo "CHECKSUMS=$CHECKSUMS" >> "$GITHUB_ENV"

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ env.TARBALL }}
            ${{ env.SBOM }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ env.TARBALL }}" \
            "${{ env.SBOM }}" \
            "${{ env.CHECKSUMS }}" \
            --title "FlowGuard v${{ env.VERSION }}" \
            --generate-notes \
            --verify-tag
