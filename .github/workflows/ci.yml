name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage --coverage.reporter=json-summary
        env:
          FORCE_COLOR: 0
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 3

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run integration tests
        run: npm run test:integration
        env:
          FORCE_COLOR: 0

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
        env:
          FORCE_COLOR: 0

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
        env:
          FORCE_COLOR: 0

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run check:format
        env:
          FORCE_COLOR: 0

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          FORCE_COLOR: 0

      - name: Verify ESM import correctness
        run: npm run check:esm
        env:
          FORCE_COLOR: 0

  install-verify:
    name: install-verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build
        env:
          FORCE_COLOR: 0

      - name: Run install-verify smoke tests
        run: npm run test:install-verify
        env:
          FORCE_COLOR: 0

  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build
        env:
          FORCE_COLOR: 0

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Verify OpenCode CLI availability
        run: |
          if ! command -v opencode >/dev/null 2>&1; then
            echo "::error::opencode CLI not found on runner. Smoke tests require it."
            exit 1
          fi
          opencode --version

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          FORCE_COLOR: 0
          RUN_OPENCODE_ACP_TESTS: '1'

  independent-review-e2e:
    name: independent-review-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package for runtime install
        run: npm run build

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai

      - name: Verify OpenCode CLI availability
        run: |
          if ! command -v opencode >/dev/null 2>&1; then
            echo "::error::opencode CLI not found on runner. Independent-review runtime e2e is mandatory."
            exit 1
          fi
          opencode --version

      - name: Run independent-review e2e verifier
        run: npm run test:independent-review-e2e
        env:
          FORCE_COLOR: 0

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12
        with:
          args: '-config-file .github/actionlint.yaml -color'

  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: codeql-sast
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript
          queries: security-extended

      - name: Build
        run: npm run build
        shell: bash

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:typescript'

  security-policy:
    name: security-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for SECURITY.md
        run: |
          if [ ! -f SECURITY.md ]; then
            echo "::error::SECURITY.md is missing"
            exit 1
          fi
          echo "SECURITY.md found"

      - name: Check for private vulnerability reporting
        run: |
          if [ ! -f .github/security-advisories.yml ] && [ ! -d .github/security-advisories ]; then
            echo "::error::Private vulnerability reporting not configured. Enable it at https://github.com/${{ github.repository }}/security/advisories/new"
            exit 1
          fi

  install:
    name: install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Pack real release tarball for testing
        id: tarball
        shell: bash
        run: |
          PKG_FILE=$(npm pack --silent)
          mkdir -p "$RUNNER_TEMP/flowguard-test"
          mv "$PKG_FILE" "$RUNNER_TEMP/flowguard-test/$PKG_FILE"
          echo "path=$RUNNER_TEMP/flowguard-test/$PKG_FILE" >> "$GITHUB_OUTPUT"

      - name: Install FlowGuard (test install)
        shell: bash
        run: |
          node dist/cli/install.js install --install-scope repo --core-tarball "${{ steps.tarball.outputs.path }}"

      - name: Verify CLI doctor
        shell: bash
        run: node dist/cli/install.js doctor --install-scope repo
