name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          FORCE_COLOR: 0
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
        env:
          FORCE_COLOR: 0

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          FORCE_COLOR: 0

  audit:
    name: audit
    runs-on: ubuntu-latest
    # Non-blocking: signal-only, not a required status check.
    # Observe results before promoting to merge-blocker.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate

  install:
    name: install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Set version variable
        run: echo "PKG_VERSION=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_ENV

      - name: Create mock tarball for testing
        id: tarball
        run: |
          mkdir -p "$RUNNER_TEMP/flowguard-test"
          echo "mock tarball" > "$RUNNER_TEMP/flowguard-test/flowguard-core-${{ env.PKG_VERSION }}.tgz"
          echo "path=$RUNNER_TEMP/flowguard-test/flowguard-core-${{ env.PKG_VERSION }}.tgz" >> $GITHUB_OUTPUT

      - name: Install FlowGuard (test install)
        run: |
          node dist/cli/install.js install --install-scope repo --core-tarball "${{ steps.tarball.outputs.path }}"

      - name: Verify CLI doctor
        run: node dist/cli/install.js doctor --install-scope repo
