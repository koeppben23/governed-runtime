name: Review Validation Host Contract

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-contract:
    name: host-contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node v6.4.0
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
        env:
          FORCE_COLOR: '0'
      - name: Run review validation host contract tests
        run: npm run test:review-validation-host-contract
        env:
          FORCE_COLOR: '0'
      - name: Run Mode-B review contract tests
        run: npm run test:review-modeb-contract
        env:
          FORCE_COLOR: '0'
      - name: Run tool-level E2E contract tests
        run: npm run test:e2e-contract
        env:
          FORCE_COLOR: '0'
