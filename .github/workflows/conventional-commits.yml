name: Conventional Commits

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  conventional-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node v6.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title with commitlint (PR)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint

      - name: Validate squash-merge commit message (push)
        if: github.event_name == 'push'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_SUBJECT="${COMMIT_MESSAGE%%$'\n'*}"
          echo "$COMMIT_SUBJECT" | npx commitlint
