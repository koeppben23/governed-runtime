name: Conventional Commits

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  conventional-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title with commitlint (PR)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint

      - name: Validate squash-merge commit message (push)
        if: github.event_name == 'push'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_SUBJECT="${COMMIT_MESSAGE%%$'\n'*}"
          echo "$COMMIT_SUBJECT" | npx commitlint
